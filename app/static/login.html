<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - NextAccount</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .logo h1 .next { color: #0052cc; }
        .logo h1 .account { color: #333; }
        .logo p {
            color: #666;
            font-size: 14px;
        }
        h2 {
            text-align: center;
            font-size: 20px;
            color: #333;
            margin-bottom: 30px;
        }
        form {
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        .required::after {
            content: " *";
            color: #e74c3c;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #0052cc;
            box-shadow: 0 0 0 3px rgba(0,82,204,0.1);
        }
        input::placeholder {
            color: #999;
        }
        .checkbox-group {
            margin-bottom: 20px;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            margin-bottom: 0;
            font-weight: 400;
            font-size: 14px;
        }
        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #0052cc;
            color: white;
            margin-bottom: 15px;
        }
        .btn-primary:hover {
            background: #0041a1;
        }
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .links a {
            color: #0052cc;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .signup-link {
            text-align: center;
            color: #666;
            font-size: 14px;
        }
        .signup-link a {
            color: #0052cc;
            text-decoration: none;
        }
        .signup-link a:hover {
            text-decoration: underline;
        }
        .org-selector {
            display: none;
        }
        .org-selector h2 {
            margin-bottom: 20px;
        }
        .org-list {
            margin-bottom: 20px;
        }
        .org-item {
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .org-item:hover {
            border-color: #0052cc;
            background: #f8faff;
        }
        .org-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        .org-type {
            font-size: 12px;
            color: #999;
        }
        .client-list {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        .client-item {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .client-item:hover {
            border-color: #0052cc;
            background: #f8faff;
        }
        .client-item.selected {
            border-color: #0052cc;
            background: #eef3ff;
        }
        .alert {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        .alert.error {
            background: #fadbd8;
            color: #c0392b;
            border: 1px solid #e74c3c;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0052cc;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <a href="/" style="text-decoration: none; color: inherit;">
                <h1><span class="next">Next</span><span class="account">Account</span></h1>
                <p>経費精算管理システム</p>
            </a>
        </div>

        <h2>ログイン</h2>

        <div class="alert error" id="errorAlert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email" class="required">メールアドレス</label>
                <input type="email" id="email" name="email" placeholder="admin@company.jp" required>
            </div>

            <div class="form-group">
                <label for="password" class="required">パスワード</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="checkbox-group">
                <label>
                    <input type="checkbox" name="remember">
                    このコンピュータでログイン状態を保持
                </label>
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">
                ログイン
            </button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>ログイン中...</p>
        </div>

        <div class="org-selector" id="orgSelector">
            <h2>組織を選択</h2>
            <div id="orgListContainer"></div>
            <button type="button" class="btn btn-primary" onclick="proceedWithSelection()">進む</button>
            <button type="button" class="btn btn-primary" style="background:#999" onclick="backToLogin()">戻る</button>
        </div>

        <div class="links">
            <a href="#">パスワードをお忘れですか？</a>
        </div>

        <div class="signup-link">
            新しくアカウント作成
            <a href="/signup.html">→</a>
        </div>

        <div class="signup-link" style="margin-top: 20px; border-top: 1px solid #e0e0e0; padding-top: 20px;">
            <a href="https://nextaccount.jp/" style="color: #666;">← トップページに戻る</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const errorAlert = document.getElementById('errorAlert');
        const orgSelector = document.getElementById('orgSelector');
        const loginFormDiv = document.getElementById('loginForm').parentElement.parentElement;

        let currentUser = null;
        let selectedOrg = null;
        let selectedClient = null;

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            errorAlert.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('メールアドレスとパスワードを入力してください');
                return;
            }

            submitBtn.disabled = true;
            loading.style.display = 'block';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'ログインに失敗しました');
                }

                currentUser = result.data;
                loading.style.display = 'none';
                form.style.display = 'none';
                document.querySelector('.links').style.display = 'none';
                document.querySelector('.signup-link').style.display = 'none';
                document.querySelector('h2').style.display = 'none';
                showOrgSelector();

            } catch (error) {
                showError(error.message);
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        });

        function showOrgSelector() {
            const container = document.getElementById('orgListContainer');
            const org = currentUser.organization;
            let html = `
                <div class="org-item" onclick="selectOrg('${org.id}', '${org.name}', '${org.org_type}')">
                    <div class="org-name">${org.name}</div>
                    <div class="org-type">${org.org_type === 'firm' ? '会計事務所' : '一般企業'}</div>
            `;

            if (currentUser.user_clients && currentUser.user_clients.length > 0) {
                html += '<div class="client-list"><strong>顧問先:</strong>';
                currentUser.user_clients.forEach(c => {
                    html += `<div class="client-item" onclick="selectClient(event, '${c.id}')">${c.name}</div>`;
                });
                html += '</div>';
            }
            html += '</div>';

            container.innerHTML = html;
            orgSelector.style.display = 'block';
        }

        function selectOrg(id, name, orgType) {
            selectedOrg = { id, name, orgType };
            selectedClient = null;
            document.querySelectorAll('.client-item').forEach(el => el.classList.remove('selected'));
        }

        function selectClient(event, clientId) {
            event.stopPropagation();
            document.querySelectorAll('.client-item').forEach(el => el.classList.remove('selected'));
            event.target.closest('.client-item').classList.add('selected');
            selectedClient = clientId;
        }

        async function proceedWithSelection() {
            if (!selectedOrg) {
                alert('組織を選択してください');
                return;
            }

            try {
                const response = await fetch('/api/auth/select', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: currentUser.user_id,
                        organization_id: selectedOrg.id,
                        client_id: selectedClient
                    })
                });

                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.error || '選択に失敗しました');
                }

                // Save token
                localStorage.setItem('authToken', result.data.token);
                localStorage.setItem('userId', result.data.user_id);
                localStorage.setItem('organizationId', result.data.organization_id);
                if (result.data.client_id) {
                    localStorage.setItem('clientId', result.data.client_id);
                }

                // Redirect to dashboard
                window.location.href = '/dashboard.html';

            } catch (error) {
                alert(error.message);
            }
        }

        function backToLogin() {
            currentUser = null;
            selectedOrg = null;
            selectedClient = null;
            form.style.display = 'block';
            document.querySelector('.links').style.display = 'flex';
            document.querySelector('.signup-link').style.display = 'block';
            document.querySelector('h2').style.display = 'block';
            orgSelector.style.display = 'none';
            submitBtn.disabled = false;
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }

        function showError(message) {
            errorAlert.textContent = message;
            errorAlert.style.display = 'block';
        }

        // Check if already logged in
        if (localStorage.getItem('authToken')) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
