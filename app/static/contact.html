<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ - NextAccount</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 150px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-back {
            background: #f0f0f0;
            color: #333;
        }

        .btn-back:hover {
            background: #e0e0e0;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📧 お問い合わせ</h1>
            <p>ご不明な点やご要望がございましたら、お気軽にご連絡ください</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="contactForm" style="display: none;">
            <div class="form-group">
                <label for="name">お名前 <span style="color: red;">*</span></label>
                <input type="text" id="name" name="name" required placeholder="例）山田太郎">
            </div>

            <div class="form-group">
                <label for="email">メールアドレス <span style="color: red;">*</span></label>
                <input type="email" id="email" name="email" required placeholder="例）yamada@company.jp">
            </div>

            <div class="form-group">
                <label for="subject">件名 <span style="color: red;">*</span></label>
                <input type="text" id="subject" name="subject" required placeholder="例）機能についてのお問い合わせ">
            </div>

            <div class="form-group">
                <label for="message">メッセージ <span style="color: red;">*</span></label>
                <textarea id="message" name="message" required placeholder="お問い合わせの内容をご入力ください"></textarea>
            </div>

            <div class="button-group">
                <button type="button" class="btn-back" onclick="goBack()">戻る</button>
                <button type="submit" class="btn-submit">送信</button>
            </div>
        </form>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>送信中...</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('contactForm');
        const loading = document.getElementById('loading');
        const alert = document.getElementById('alert');

        // Show form on load
        window.addEventListener('load', function() {
            form.style.display = 'block';
        });

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const subject = document.getElementById('subject').value.trim();
            const message = document.getElementById('message').value.trim();

            if (!name || !email || !subject || !message) {
                showAlert('すべてのフィールドを入力してください', 'error');
                return;
            }

            // Show loading, hide form
            form.style.display = 'none';
            loading.classList.add('show');

            try {
                const response = await fetch('/api/send-contact', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: name,
                        email: email,
                        subject: subject,
                        message: message
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('お問い合わせを送信しました。ご連絡ありがとうございます。', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 2000);
                } else {
                    showAlert(data.error || '送信に失敗しました。もう一度お試しください。', 'error');
                    form.style.display = 'block';
                    loading.classList.remove('show');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('ネットワークエラーが発生しました。', 'error');
                form.style.display = 'block';
                loading.classList.remove('show');
            }
        });

        function showAlert(message, type) {
            alert.textContent = message;
            alert.className = 'alert show alert-' + type;
        }

        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
