<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextAccount - 経費精算管理システム</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 480px;
            padding: 60px 40px;
            text-align: center;
        }
        .logo {
            margin-bottom: 40px;
        }
        .logo h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .logo h1 .next { color: #0052cc; }
        .logo h1 .account { color: #333; }
        .logo p {
            color: #666;
            font-size: 14px;
        }
        .tagline {
            font-size: 18px;
            color: #333;
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 500;
        }
        .tagline-sub {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
            margin-bottom: 15px;
        }
        .btn-primary {
            background: #0052cc;
            color: white;
        }
        .btn-primary:hover {
            background: #0041a1;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .features {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #e0e0e0;
            text-align: left;
        }
        .features h3 {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
            text-align: center;
        }
        .feature-item {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #666;
        }
        .feature-item .icon {
            font-size: 18px;
            flex-shrink: 0;
        }
        .feature-item p {
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1><span class="next">Next</span><span class="account">Account</span></h1>
            <p>経費精算管理システム</p>
        </div>

        <div class="tagline">
            Slack から経費を自動仕訳
        </div>
        <div class="tagline-sub">
            領収書をアップロードするだけで、<br>AI が自動で会計仕訳を生成します
        </div>

        <a href="/signup.html" class="btn btn-primary">アカウント登録</a>
        <a href="/login.html" class="btn btn-secondary">ログイン</a>

        <div class="features">
            <h3>特徴</h3>
            <div class="feature-item">
                <div class="icon">🤖</div>
                <div>
                    <p><strong>AI OCR</strong><br>
                    領収書から自動で金額・店舗名を認識</p>
                </div>
            </div>
            <div class="feature-item">
                <div class="icon">⚡</div>
                <div>
                    <p><strong>自動仕訳</strong><br>
                    会計仕訳が自動で生成される</p>
                </div>
            </div>
            <div class="feature-item">
                <div class="icon">📊</div>
                <div>
                    <p><strong>複数会計ソフト対応</strong><br>
                    9種類の会計ソフトに対応</p>
                </div>
            </div>
            <div class="feature-item">
                <div class="icon">💬</div>
                <div>
                    <p><strong>Slack 連携</strong><br>
                    Slack 内で作業が完結</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
