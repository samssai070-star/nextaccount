<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextAccount 管理者ページ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #fff; border-radius: 12px; padding: 40px; width: 100%; max-width: 480px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  h1 { font-size: 22px; color: #1a202c; margin-bottom: 8px; }
  .subtitle { color: #718096; font-size: 14px; margin-bottom: 32px; }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
  input { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
  .btn { width: 100%; padding: 12px; background: #667eea; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn:hover { background: #5a6fd6; }
  .btn:disabled { background: #a0aec0; cursor: not-allowed; }
  .result { margin-top: 24px; padding: 16px; border-radius: 8px; font-size: 14px; display: none; }
  .result.success { background: #f0fff4; border: 1px solid #68d391; color: #276749; }
  .result.error { background: #fff5f5; border: 1px solid #fc8181; color: #c53030; }
  .code-box { background: #2d3748; color: #68d391; padding: 12px 16px; border-radius: 6px; font-family: monospace; font-size: 22px; letter-spacing: 4px; text-align: center; margin: 12px 0; }
  .meta { font-size: 12px; color: #4a5568; }
  .divider { border: none; border-top: 1px solid #e2e8f0; margin: 28px 0; }
  #loginSection, #mainSection { }
  #mainSection { display: none; }
  .badge { display: inline-block; background: #ebf4ff; color: #3182ce; font-size: 11px; padding: 2px 8px; border-radius: 99px; margin-left: 8px; vertical-align: middle; }
  .history { margin-top: 24px; }
  .history h3 { font-size: 14px; font-weight: 600; color: #4a5568; margin-bottom: 12px; }
  .history-item { padding: 10px 14px; background: #f7fafc; border-radius: 6px; margin-bottom: 8px; font-size: 13px; }
  .history-item .email { font-weight: 600; color: #2d3748; }
  .history-item .info { color: #718096; margin-top: 2px; }
</style>
</head>
<body>
<div class="card">
  <h1>🔐 NextAccount 管理者</h1>
  <p class="subtitle">授権コード発行ページ</p>

  <!-- ログインセクション -->
  <div id="loginSection">
    <div class="form-group">
      <label>管理者キー</label>
      <input type="password" id="adminKey" placeholder="管理者キーを入力" autocomplete="off">
    </div>
    <button class="btn" onclick="login()">ログイン</button>
    <div class="result" id="loginResult"></div>
  </div>

  <!-- メインセクション -->
  <div id="mainSection">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <span style="font-size:13px;color:#68d369;font-weight:600;">✓ 管理者認証済み</span>
      <button onclick="logout()" style="background:none;border:none;color:#718096;cursor:pointer;font-size:13px;">ログアウト</button>
    </div>

    <div class="form-group">
      <label>顧客メールアドレス <span class="badge">管理者ユーザー</span></label>
      <input type="email" id="orgEmail" placeholder="customer@example.com">
    </div>
    <button class="btn" id="issueBtn" onclick="issueCode()">授権コードを発行してメール送信</button>

    <div class="result" id="issueResult"></div>

    <div class="history" id="historySection" style="display:none">
      <hr class="divider">
      <h3>📋 発行履歴（今回のセッション）</h3>
      <div id="historyList"></div>
    </div>
  </div>
</div>

<script>
let adminKey = '';
const history = [];

function login() {
  const key = document.getElementById('adminKey').value.trim();
  if (!key) return;

  // キーを一時的に保存してテスト
  adminKey = key;
  const resultEl = document.getElementById('loginResult');
  resultEl.style.display = 'block';
  resultEl.className = 'result';
  resultEl.textContent = '認証中...';

  // ダミーリクエストで認証テスト
  fetch('/api/org/admin/issue-upgrade-code', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Key': key },
    body: JSON.stringify({ organization_email: '' })
  }).then(r => r.json()).then(data => {
    if (data.error === 'organization_email required') {
      // 認証成功（リクエスト自体は通った）
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('mainSection').style.display = 'block';
    } else if (data.error === 'Unauthorized') {
      adminKey = '';
      resultEl.className = 'result error';
      resultEl.textContent = '管理者キーが正しくありません。';
    } else {
      adminKey = '';
      resultEl.className = 'result error';
      resultEl.textContent = '認証エラー: ' + data.error;
    }
  }).catch(() => {
    adminKey = '';
    resultEl.className = 'result error';
    resultEl.textContent = 'サーバーに接続できません。';
  });
}

function logout() {
  adminKey = '';
  document.getElementById('adminKey').value = '';
  document.getElementById('loginResult').style.display = 'none';
  document.getElementById('mainSection').style.display = 'none';
  document.getElementById('loginSection').style.display = 'block';
}

function issueCode() {
  const email = document.getElementById('orgEmail').value.trim().toLowerCase();
  const resultEl = document.getElementById('issueResult');

  if (!email) {
    resultEl.style.display = 'block';
    resultEl.className = 'result error';
    resultEl.textContent = 'メールアドレスを入力してください。';
    return;
  }

  const btn = document.getElementById('issueBtn');
  btn.disabled = true;
  btn.textContent = '発行中...';
  resultEl.style.display = 'block';
  resultEl.className = 'result';
  resultEl.textContent = '処理中...';

  fetch('/api/org/admin/issue-upgrade-code', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey },
    body: JSON.stringify({ organization_email: email })
  }).then(r => r.json()).then(data => {
    btn.disabled = false;
    btn.textContent = '授権コードを発行してメール送信';

    if (data.success) {
      const expiry = new Date(data.data.expires_at).toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });
      resultEl.className = 'result success';
      resultEl.innerHTML = `
        <div style="font-weight:600;margin-bottom:8px">✓ 発行完了・メール送信済み</div>
        <div class="code-box">${data.data.code}</div>
        <div class="meta">
          <div>組織名: <strong>${data.data.organization}</strong></div>
          <div>送信先: ${data.data.email}</div>
          <div>有効期限: ${expiry}</div>
        </div>
      `;

      // 履歴に追加
      history.unshift({ email: data.data.email, org: data.data.organization, code: data.data.code, expiry, time: new Date().toLocaleTimeString('ja-JP') });
      renderHistory();
      document.getElementById('orgEmail').value = '';
    } else {
      resultEl.className = 'result error';
      resultEl.textContent = 'エラー: ' + data.error;
    }
  }).catch(() => {
    btn.disabled = false;
    btn.textContent = '授権コードを発行してメール送信';
    resultEl.className = 'result error';
    resultEl.textContent = 'サーバーエラーが発生しました。';
  });
}

function renderHistory() {
  if (history.length === 0) return;
  document.getElementById('historySection').style.display = 'block';
  document.getElementById('historyList').innerHTML = history.map(h => `
    <div class="history-item">
      <div class="email">${h.email} — ${h.org}</div>
      <div class="info">コード: <strong>${h.code}</strong> ／ 有効期限: ${h.expiry} ／ 発行: ${h.time}</div>
    </div>
  `).join('');
}

document.getElementById('adminKey').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('orgEmail') && document.getElementById('orgEmail').addEventListener('keydown', e => { if (e.key === 'Enter') issueCode(); });
</script>
</body>
</html>
